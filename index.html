<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ile Amao">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Ile Amao</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <svg class="logo-icon" viewBox="0 0 32 32" width="28" height="28">
          <path d="M16 2L3 10v14l13 8 13-8V10L16 2z" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M16 8l-7 4.5v7L16 24l7-4.5v-7L16 8z" fill="currentColor" opacity="0.2"/>
          <circle cx="16" cy="16" r="3" fill="currentColor"/>
        </svg>
        <h1 class="app-title">Ile Amao</h1>
      </div>
      <button class="avatar-btn" id="profileBtn" aria-label="Profile">
        <span class="avatar" id="currentUserAvatar">E</span>
      </button>
    </header>

    <!-- User switcher overlay -->
    <div class="overlay" id="profileOverlay">
      <div class="overlay-content profile-panel">
        <h2>Who's using?</h2>
        <div class="user-select">
          <button class="user-option" data-user="elzanne">
            <span class="avatar avatar-large" style="background: var(--sage)">E</span>
            <span>Elzanne</span>
          </button>
          <button class="user-option" data-user="partner">
            <span class="avatar avatar-large" style="background: var(--navy)">D</span>
            <span>Deji</span>
          </button>
        </div>
        <button class="btn-text" id="closeProfile">Cancel</button>
      </div>
    </div>

    <!-- Main content -->
    <main class="main-content" id="mainContent">
      <!-- Dashboard view -->
      <section class="view active" id="dashboardView">
        <div class="greeting" id="greeting"></div>
        <p class="motivation" id="motivation"></p>
        <div class="stats-row">
          <div class="stat-card">
            <span class="stat-number" id="statTodo">0</span>
            <span class="stat-label">To Do</span>
          </div>
          <div class="stat-card">
            <span class="stat-number" id="statDone">0</span>
            <span class="stat-label">Done Today</span>
          </div>
          <div class="stat-card accent">
            <span class="stat-number" id="statTotal">0</span>
            <span class="stat-label">Total</span>
          </div>
        </div>

        <div class="section-header">
          <h2 id="todayHeader">Today's Tasks</h2>
        </div>
        <div class="task-list" id="todayTasks"></div>

        <div class="section-header">
          <h2>Upcoming</h2>
        </div>
        <div class="task-list" id="upcomingTasks"></div>
      </section>

      <!-- Tasks view -->
      <section class="view" id="tasksView">
        <div class="tabs">
          <button class="tab active" data-filter="all">All</button>
          <button class="tab" data-filter="daily">Daily</button>
          <button class="tab" data-filter="3x_week">3x/Week</button>
          <button class="tab" data-filter="every_3rd_day">Every 3rd</button>
          <button class="tab" data-filter="weekly">Weekly</button>
          <button class="tab" data-filter="monthly">Monthly</button>
          <button class="tab" data-filter="adhoc">Ad Hoc</button>
        </div>
        <div class="filter-row">
          <select class="filter-select" id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="chores">Daily Chores</option>
            <option value="cleaning">Cleaning</option>
            <option value="deepclean">Deep Clean</option>
            <option value="garden">Garden</option>
            <option value="child">Little One</option>
            <option value="admin">Admin & Errands</option>
            <option value="groceries">Groceries</option>
          </select>
          <select class="filter-select" id="assigneeFilter">
            <option value="all">Everyone</option>
            <option value="elzanne">Elzanne</option>
            <option value="partner">Deji</option>
            <option value="both">Both</option>
            <option value="outsourced">Outsourced</option>
          </select>
        </div>
        <div class="task-list" id="allTasks"></div>
      </section>

      <!-- Groceries view -->
      <section class="view" id="groceriesView">
        <div class="section-header">
          <h2>Shopping List</h2>
          <button class="btn btn-sm btn-secondary" id="clearCheckedBtn">Clear bought</button>
        </div>

        <form class="grocery-add" id="groceryForm">
          <input type="text" id="groceryInput" placeholder="Add item..." autocomplete="off">
          <button type="submit" class="btn btn-primary btn-sm">Add</button>
        </form>

        <div class="grocery-list" id="groceryList"></div>

        <div class="grocery-summary" id="grocerySummary"></div>
      </section>

      <!-- Log Slips view -->
      <section class="view" id="slipsView">
        <div class="section-header">
          <h2>Log Slips</h2>
        </div>

        <form class="task-form" id="slipForm">
          <div class="form-group">
            <label for="slipDate">Date</label>
            <input type="date" id="slipDate" required>
          </div>
          <div class="form-group">
            <label for="slipMonth">Salary Month</label>
            <input type="month" id="slipMonth" required>
          </div>
          <div class="form-group">
            <label for="slipCategory">Category</label>
            <select id="slipCategory" required>
              <optgroup label="General">
                <option value="General: Petrol">Petrol</option>
              </optgroup>
              <optgroup label="Groceries">
                <option value="Groceries: Checkers">Checkers</option>
                <option value="Groceries: Clicks">Clicks</option>
                <option value="Groceries: Dischem">Dischem</option>
                <option value="Groceries: Food Lover's Market">Food Lover's Market</option>
                <option value="Groceries: Makro">Makro</option>
                <option value="Groceries: Nigerian Food">Nigerian Food</option>
                <option value="Groceries: Other">Other</option>
                <option value="Groceries: Pick 'n Pay">Pick 'n Pay</option>
                <option value="Groceries: Spar">Spar</option>
                <option value="Groceries: Woolworths">Woolworths</option>
              </optgroup>
              <optgroup label="Misc Expenses">
                <option value="Misc Ex: Car Maintenance">Car Maintenance</option>
                <option value="Misc Ex: Clothing + Perfume">Clothing + Perfume</option>
                <option value="Misc Ex: Dining Out">Dining Out</option>
                <option value="Misc Ex: Gifts">Gifts</option>
                <option value="Misc Ex: Hair and Nails">Hair and Nails</option>
                <option value="Misc Ex: Medical">Medical</option>
                <option value="Misc Ex: Home Related">Home Related</option>
                <option value="Misc Ex: Miscellaneous">Miscellaneous</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label for="slipAmount">Amount (R)</label>
            <input type="number" id="slipAmount" placeholder="0.00" step="0.01" min="0" required inputmode="decimal">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Log Slip</button>
          </div>
        </form>

        <div class="slip-filter-row">
          <select class="filter-select" id="slipMonthFilter"></select>
        </div>

        <div class="slip-summary" id="slipSummary"></div>
        <div class="slip-list" id="slipList"></div>
      </section>

      <!-- Add/Edit task view -->
      <section class="view" id="addTaskView">
        <h2 class="view-title" id="addTaskTitle">New Task</h2>
        <form id="taskForm" class="task-form">
          <input type="hidden" id="taskId">
          <div class="form-group">
            <label for="taskName">Task</label>
            <input type="text" id="taskName" placeholder="What needs doing?" required>
          </div>
          <div class="form-group">
            <label for="taskCategory">Category</label>
            <select id="taskCategory">
              <option value="chores">Daily Chores</option>
              <option value="cleaning">Cleaning</option>
              <option value="deepclean">Deep Clean</option>
              <option value="garden">Garden</option>
              <option value="child">Little One</option>
              <option value="admin">Admin & Errands</option>
              <option value="groceries">Groceries</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskFrequency">Frequency</label>
            <select id="taskFrequency">
              <option value="daily">Daily</option>
              <option value="3x_week">3x / Week</option>
              <option value="every_3rd_day">Every 3rd Day</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="adhoc">One-off</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskAssignee">Assigned to</label>
            <select id="taskAssignee">
              <option value="elzanne">Elzanne</option>
              <option value="partner">Deji</option>
              <option value="both">Both</option>
              <option value="outsourced">Outsourced</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskNotes">Notes (optional)</label>
            <textarea id="taskNotes" rows="2" placeholder="Any details..."></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancelTask">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Task</button>
          </div>
        </form>
      </section>
    </main>

    <!-- Notification prompt banner -->
    <div class="notif-banner" id="notifBanner">
      <div class="notif-banner-text">
        <strong>Get daily reminders</strong>
        <span>We'll notify you each morning with your tasks for the day.</span>
      </div>
      <div class="notif-banner-actions">
        <button class="btn btn-primary btn-sm" id="notifAllow">Enable</button>
        <button class="btn-text" id="notifDismiss">Not now</button>
      </div>
    </div>

    <!-- FAB -->
    <button class="fab" id="fabAdd" aria-label="Add task">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="dashboardView">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-view="tasksView">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M9 10l2 2 4-4"/>
        </svg>
        <span>Tasks</span>
      </button>
      <button class="nav-item" data-view="groceriesView">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span>Groceries</span>
      </button>
      <button class="nav-item" data-view="slipsView">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Slips</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
